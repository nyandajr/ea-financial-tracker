name: Data Update

on:
  schedule:
    - cron: '*/30 * * * *'  # Crypto — every 30 minutes
    - cron: '0 * * * *'     # FX rates — hourly (source data only refreshes daily; polling faster risks rate limits for no benefit)
  workflow_dispatch:  # Manual trigger too

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Fetch crypto prices
      if: github.event.schedule == '*/30 * * * *' || github.event_name == 'workflow_dispatch'
      run: python src/fetch_data.py --crypto

    - name: Fetch exchange rates
      if: github.event.schedule == '0 * * * *' || github.event_name == 'workflow_dispatch'
      run: python src/fetch_data.py --fx

    - name: Run predictions
      run: python src/predict.py

    - name: Commit and push
      run: |
        git config user.name "nyandajr"
        git config user.email "freddynyanda@proton.me"
        git add data/
        git diff --cached --quiet || git commit -m "data: update - $(date '+%Y-%m-%d %H:%M')"
        git push || (git pull --rebase origin main && git push)
